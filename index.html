<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="/stylesheet.css">

  <title>Frontend Mentor | Social links profile</title>

</head>
<body>
  <main>
    <section class="profile-wrapper">
      <section class="profile">
        <h1 class="full-name">Jessica Randall</h1>
        <h2 class="location">London, United Kingdom</h2>
        <p class="description">"Front-end developer and avid reader."</p>

        <p class="social-links">GitHub</p>
        <p class="social-links">Frontend Mentor</p>
        <p class="social-links">LinkedIn</p>
        <p class="social-links">Twitter</p>
        <p class="social-links">Instagram</p>
      </section>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
